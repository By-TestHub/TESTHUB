<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #001630 0%, #01040a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: #ffffff;
            overflow-x: hidden;
        }

        .card {
            background: rgba(2, 10, 24, 0.9);
            backdrop-filter: blur(12px);
            border: 1.5px solid #00d2ff;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(0, 210, 255, 0.2);
        }

        .title {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.9),
                         0 0 30px rgba(0, 102, 255, 0.6);
            margin-bottom: 25px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-desc {
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 400;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #2b39c0 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
        }
        .btn-discord:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(88, 101, 242, 0.6);
        }

        .btn i {
            font-size: 1.3rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            .title {
                font-size: 2.4rem;
            }
            .btn {
                font-size: 1.1rem;
                padding: 14px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">TEST HUB</div>
        
        <div class="button-group">
            <p class="top-desc">สคริปต์ฟรีที่แจกทั้งหมดอยู่ใน Discord นะครับ</p>

            <a href="https://discord.gg/Ttwq9Udwhc" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> เข้าร่วม Discord
            </a>
        </div>
    </div>

</body>
</html>
