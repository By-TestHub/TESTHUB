<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST HUB</title>
    <!-- นำเข้าฟอนต์ Google Font (Kanit) เพื่อความโมเดิร์น -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- นำเข้า Icon จาก Font Awesome สำหรับโลโก้ Discord -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            /* พื้นหลังไล่เฉดสีมืดสไตล์อวกาศโทนม่วงแบบในรูป */
            background: radial-gradient(circle at center, #160a2b 0%, #060309 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* การ์ดสไตล์ Glassmorphism ผสมนีออน */
        .card {
            background: rgba(19, 9, 34, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(114, 9, 183, 0.15);
            transition: transform 0.3s ease;
        }

        /* หัวข้อด้านบนสุด */
        .title {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.6),
                         0 0 20px rgba(188, 19, 254, 0.3);
            margin-bottom: 10px;
        }

        /* คำอธิบายใต้หัวข้อ (แทนรูปภาพ) */
        .description {
            font-size: 1rem;
            color: #b0a2c7;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* ตัวแบ่งเส้นตกแต่งแบบในรูป */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(188, 19, 254, 0.5), transparent);
            margin-bottom: 25px;
            position: relative;
        }
        .divider::after {
            content: '✦';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #bc13fe;
            font-size: 0.8rem;
            background: #130922;
            padding: 0 8px;
        }

        /* กล่องใส่วิดีโอ */
        .video-container {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(188, 19, 254, 0.3);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.1);
            margin-bottom: 30px;
            aspect-ratio: 16 / 9; /* ล็อคอัตราส่วนวิดีโอ */
            background: #000;
        }
        .video-container iframe, .video-container video {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ส่วนของกลุ่มปุ่ม */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* สไตล์ปุ่มพื้นฐาน */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* ปุ่มที่ 1: Discord (ไล่เฉดสีม่วงนีออนแบบในรูปภาพตัวอย่าง) */
        .btn-discord {
            background: linear-gradient(135deg, #7300ff 0%, #bd00ff 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(189, 0, 255, 0.4),
                        inset 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .btn-discord:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(189, 0, 255, 0.6),
                        inset 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* ปุ่มที่ 2: วิธีซื้อสคริปต์ (สไตล์โปร่งแสงขอบนีออน) */
        .btn-guide {
            background: rgba(255, 255, 255, 0.03);
            color: #dcb5ff;
            border: 1px solid rgba(188, 19, 254, 0.4);
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.1);
        }
        .btn-guide:hover {
            background: rgba(188, 19, 254, 0.1);
            color: #ffffff;
            border-color: #hd00ff;
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        .btn i {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- หัวข้อหลัก -->
        <div class="title">TEST HUB</div>
        
        <!-- คำอธิบายแทนรูปภาพ -->
        <p class="description">
            ยินดีต้อนรับสู่ TEST HUB แหล่งรวบรวมสคริปต์ที่ดีที่สุด ปลอดภัย เสถียร และอัปเดตใหม่ตลอดเวลา เลือกเมนูด้านล่างเพื่อเข้าร่วมชุมชนหรือดูขั้นตอนการสั่งซื้อได้เลยครับ
        </p>

        <!-- เส้นแบ่งดีไซน์ -->
        <div class="divider"></div>

        <!-- โซนวิดีโอ (เปลี่ยน URL ตรง src ได้ตามต้องการ) -->
        <div class="video-container">
            <!-- ตัวอย่าง: ใช้ลิงก์ YouTube Embed (อย่าลืมเปลี่ยนหลัง /embed/ เป็น ID คลิปของคุณ) -->
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>

        <!-- กลุ่มปุ่มกด -->
        <div class="button-group">
            <!-- ปุ่มที่ 1: ลิงก์ Discord (ใส่ลิงก์เชิญของคุณตรง href) -->
            <a href="https://discord.gg/YOUR_INVITE_LINK" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> เข้าร่วม Discord
            </a>

            <!-- ปุ่มที่ 2: วิธีซื้อสคริปต์ (ใส่ลิงก์คู่มือหรือหน้าเว็บสั่งซื้อตรง href) -->
            <a href="https://your-website.com/how-to-buy" target="_blank" class="btn btn-guide">
                <i class="fas fa-shopping-cart"></i> วิธีซื้อสคริปต์
            </a>
        </div>
    </div>

</body>
</html>
