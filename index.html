<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST HUB Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #001630 0%, #01040a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: #ffffff;
            overflow-x: hidden;
        }

        .card {
            background: rgba(2, 10, 24, 0.9);
            backdrop-filter: blur(12px);
            border: 1.5px solid #00d2ff;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(0, 210, 255, 0.2);
        }

        .title {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.9),
                         0 0 30px rgba(0, 102, 255, 0.6);
            margin-bottom: 25px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-desc {
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 400;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #2b39c0 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
        }
        .btn-discord:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(88, 101, 242, 0.6);
        }

        .btn-guide {
            background: linear-gradient(135deg, #0077ff 0%, #00d2ff 100%);
            color: #ffffff;
            box-shadow: 0 5px 25px rgba(0, 210, 255, 0.5);
        }
        .btn-guide:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 210, 255, 0.8);
        }

        .btn i {
            font-size: 1.3rem;
        }

        .video-box {
            display: none; 
            width: 100%;
            max-width: 340px; 
            margin: 25px auto 0 auto;
            border-radius: 20px;
            background: #000;
            border: 2.5px solid #00d2ff;
            overflow: hidden;
            animation: electric-glow 2.5s infinite ease-in-out;
        }

        .video-box.active {
            display: block;
        }

        .video-box video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain; 
        }

        @keyframes electric-glow {
            0% {
                box-shadow: 0 0 15px rgba(0, 210, 255, 0.6), inset 0 0 10px rgba(0, 210, 255, 0.3);
                border-color: #00d2ff;
            }
            50% {
                box-shadow: 0 0 30px rgba(0, 150, 255, 0.9), inset 0 0 20px rgba(0, 150, 255, 0.5);
                border-color: #0096ff;
            }
            100% {
                box-shadow: 0 0 15px rgba(0, 210, 255, 0.6), inset 0 0 10px rgba(0, 210, 255, 0.3);
                border-color: #00d2ff;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            .title {
                font-size: 2.4rem;
            }
            .btn {
                font-size: 1.1rem;
                padding: 14px 15px;
            }
            .video-box {
                max-width: 100%; 
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">TEST HUB</div>
        
        <div class="button-group">
            <p class="top-desc">หากต้องการซื้อสคริปต์ดูวิธีข้างล่างได้เลยครับ<br>(กรุณาเข้าร่วม Discord ก่อนสั่งซื้อนะ)</p>

            <a href="https://discord.gg/Ttwq9Udwhc" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> เข้าร่วม Discord
            </a>
            
            <button onclick="toggleVideoInstant()" class="btn btn-guide">
                <i class="fas fa-shopping-cart"></i> วิธีซื้อสคริปต์
            </button>
        </div>

        <div id="videoContainer" class="video-box">
            <video id="myVideo" src="88e39a28-563c-4409-b9a1-cc29fe51b7c2.mp4" controls preload="metadata"></video>
        </div>
    </div>

    <script>
        function toggleVideoInstant() {
            var videoBox = document.getElementById("videoContainer");
            var videoPlayer = document.getElementById("myVideo");
            
            videoBox.classList.toggle("active");
            
            if (!videoBox.classList.contains("active")) {
                videoPlayer.pause();
            } else {
                videoPlayer.play();
            }
        }
    </script>

</body>
</html>
