<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST HUB</title>
    <!-- นำเข้าฟอนต์ Google Font (Kanit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- นำเข้า Icon จาก Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            /* พื้นหลังดาร์กน้ำเงิน-ดำ เน้นออร่าฟ้าไฟฟ้า */
            background: radial-gradient(circle at center, #001630 0%, #01040a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* การ์ดหลัก ขยายความกว้างสูงสุดเป็น 550px เพื่อให้วิดีโอตัวใหญ่เต็มตา */
        .card {
            background: rgba(2, 10, 24, 0.9);
            backdrop-filter: blur(12px);
            border: 1.5px solid #00d2ff;
            border-radius: 24px;
            width: 100%;
            max-width: 550px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(0, 210, 255, 0.2);
        }

        /* หัวข้อ TEST HUB สีฟ้าเรืองแสงไฟฟ้า */
        .title {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.9),
                         0 0 30px rgba(0, 102, 255, 0.6);
            margin-bottom: 25px;
        }

        /* โซนปุ่มกดและข้อความ */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        /* ปุ่มที่ 1: Discord ลิงก์ตรง */
        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #2b39c0 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
        }
        .btn-discord:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(88, 101, 242, 0.6);
        }

        /* ข้อความอธิบายด้านล่างปุ่มเข้าดิสคอส */
        .discord-desc {
            font-size: 1rem;
            color: #00d2ff;
            font-weight: 400;
            margin: 5px 0 15px 0;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
        }

        /* ปุ่มที่ 2: วิธีซื้อสคริปต์ (สีฟ้าไฟฟ้านีออนสว่างจัด) */
        .btn-guide {
            background: linear-gradient(135deg, #0077ff 0%, #00d2ff 100%);
            color: #ffffff;
            box-shadow: 0 5px 25px rgba(0, 210, 255, 0.5);
        }
        .btn-guide:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 210, 255, 0.8),
                        0 0 20px rgba(0, 210, 255, 0.5);
        }

        .btn i {
            font-size: 1.3rem;
        }

        /* กล่องเก็บวิดีโอขนาดใหญ่ (แสดงผลทันทีไม่มีดีเลย์เลื่อนช้า) */
        .video-box {
            display: none; /* ซ่อนไว้เริ่มต้น */
            width: 100%;
            border-radius: 16px;
            background: #000;
            margin-top: 25px;
            border: 2.5px solid #00d2ff;
            overflow: hidden;
            /* แอนิเมชันกระแสไฟสีฟ้าวิ่งรอบกรอบ */
            animation: electric-glow 2.5s infinite ease-in-out;
        }

        /* คลาสเปิดใช้งานวิดีโอแบบทันที */
        .video-box.active {
            display: block;
        }

        /* ตัวเล่นวิดีโอขนาดใหญ่ รองรับมือถือ ไม่โดนครอปภาพ */
        .video-box video {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 14px;
        }

        /* แอนิเมชันกระแสไฟฟ้าวิ่งสีฟ้า */
        @keyframes electric-glow {
            0% {
                box-shadow: 0 0 15px rgba(0, 210, 255, 0.6), inset 0 0 10px rgba(0, 210, 255, 0.3);
                border-color: #00d2ff;
            }
            50% {
                box-shadow: 0 0 30px rgba(0, 150, 255, 0.9), inset 0 0 20px rgba(0, 150, 255, 0.5);
                border-color: #0096ff;
            }
            100% {
                box-shadow: 0 0 15px rgba(0, 210, 255, 0.6), inset 0 0 10px rgba(0, 210, 255, 0.3);
                border-color: #00d2ff;
            }
        }

        /* Responsive สำหรับหน้าจอมือถือขนาดเล็ก */
        @media (max-width: 480px) {
            .card {
                padding: 30px 15px;
            }
            .title {
                font-size: 2.4rem;
            }
            .btn {
                font-size: 1.1rem;
                padding: 14px 15px;
            }
            .discord-desc {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- หัวข้อหลัก -->
        <div class="title">TEST HUB</div>
        
        <!-- กลุ่มปุ่มกดและคำอธิบาย -->
        <div class="button-group">
            
            <!-- ปุ่มที่ 1: ลิงก์เข้า Discord จริงของคุณ -->
            <a href="https://discord.gg/Ttwq9Udwhc" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> เข้าร่วม Discord
            </a>
            
            <!-- ข้อความอธิบายด้านล่างปุ่มเข้าดิสคอส -->
            <p class="discord-desc">สคริปต์ทั้งหมดอยู่ในดิส กดปุ่มด้านบนกดเข้ามาเลย</p>

            <!-- ปุ่มที่ 2: วิธีซื้อสคริปต์ -->
            <button onclick="toggleVideoInstant()" class="btn btn-guide">
                <i class="fas fa-shopping-cart"></i> วิธีซื้อสคริปต์
            </button>
            
        </div>

        <!-- กล่องแสดงวิดีโอขนาดใหญ่ (เปิดใช้งานทันทีเมื่อกดปุ่ม) -->
        <div id="videoContainer" class="video-box">
            <video id="myVideo" src="88e39a28-563c-4409-b9a1-cc29fe51b7c2.mp4" controls preload="metadata"></video>
        </div>
    </div>

    <!-- JavaScript ควบคุมการแสดงผลทันทีและการหยุดคลิป -->
    <script>
        function toggleVideoInstant() {
            var videoBox = document.getElementById("videoContainer");
            var videoPlayer = document.getElementById("myVideo");
            
            // สลับเปิด-ปิดใช้งานกล่องวิดีโอทันที
            videoBox.classList.toggle("active");
            
            // ถ้าสั่งปิดหน้าต่าง ให้หยุดเล่นเสียงวิดีโอด้วย
            if (!videoBox.classList.contains("active")) {
                videoPlayer.pause();
            } else {
                // ถ้าสั่งเปิด ให้เริ่มเล่นวิดีโออัตโนมัติ (เลือกเปิดใช้หรือไม่ก็ได้)
                videoPlayer.play();
            }
        }
    </script>

</body>
</html>
