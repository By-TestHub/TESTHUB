<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST HUB</title>
    <!-- นำเข้าฟอนต์ Google Font (Kanit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- นำเข้า Icon จาก Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #001226 0%, #01050d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* การ์ดหลักธีมฟ้าไฟฟ้านีออน */
        .card {
            background: rgba(3, 12, 28, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 210, 255, 0.25);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 
                        0 0 35px rgba(0, 210, 255, 0.15);
        }

        /* หัวข้อ TEST HUB */
        .title {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8),
                         0 0 20px rgba(0, 102, 255, 0.5);
            margin-bottom: 12px;
        }

        /* คำอธิบายด้านบน */
        .description {
            font-size: 0.95rem;
            color: #a4c2ec;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* โซนปุ่มกด */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }

        /* ปุ่มที่ 1: Discord */
        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #3a47c7 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.3);
        }
        .btn-discord:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(88, 101, 242, 0.5);
        }

        /* ปุ่มที่ 2: วิธีซื้อสคริปต์ */
        .btn-guide {
            background: linear-gradient(135deg, #0088ff 0%, #00d2ff 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4);
        }
        .btn-guide:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 210, 255, 0.7),
                        0 0 15px rgba(0, 210, 255, 0.4);
        }

        .btn i {
            font-size: 1.2rem;
        }

        /* กล่องเก็บวิดีโอ (ปรับปรุงให้รองรับวิดีโอทุกสัดส่วนแบบเต็มจอไม่โดนตัด) */
        .video-box {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
            border-radius: 14px;
            background: #000;
            margin-top: 0;
            border: 2px solid transparent;
            width: 100%;
        }

        /* แสดงผลวิดีโอพร้อมแอนิเมชันกระแสไฟสีฟ้าวิ่ง */
        .video-box.show {
            max-height: 600px; /* เพิ่มพื้นที่สูงสุดให้วิดีโอแสดงผลได้เต็มที่ */
            opacity: 1;
            margin-top: 25px;
            border-color: #00d2ff;
            animation: electric-pulse 3s infinite ease-in-out;
        }

        /* ตัวเล่นวิดีโอปรับให้เห็นเต็มจอ 100% ไม่ครอปออก */
        .video-box video {
            width: 100%;
            height: auto; /* ปรับความสูงอัตโนมัติตามคลิปจริง ไม่โดนตัดหัวตัดท้าย */
            display: block;
            border-radius: 12px;
        }

        /* แอนิเมชันแสงไฟฟ้าวิ่งรอบกรอบวิดีโอ */
        @keyframes electric-pulse {
            0% {
                box-shadow: 0 0 12px rgba(0, 210, 255, 0.6), inset 0 0 8px rgba(0, 210, 255, 0.3);
                border-color: #00d2ff;
            }
            33% {
                box-shadow: 0 0 25px rgba(0, 90, 255, 0.8), inset 0 0 15px rgba(0, 90, 255, 0.4);
                border-color: #005AFF;
            }
            66% {
                box-shadow: 0 0 18px rgba(0, 255, 220, 0.7), inset 0 0 10px rgba(0, 255, 220, 0.3);
                border-color: #00ffdc;
            }
            100% {
                box-shadow: 0 0 12px rgba(0, 210, 255, 0.6), inset 0 0 8px rgba(0, 210, 255, 0.3);
                border-color: #00d2ff;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- หัวข้อหลัก -->
        <div class="title">TEST HUB</div>
        
        <!-- คำอธิบายด้านบนสุด -->
        <p class="description">
            ยินดีต้อนรับสู่ TEST HUB แหล่งรวบรวมสคริปต์ประสิทธิภาพสูง เสถียร และปลอดภัยที่สุด เลือกกดปุ่มด้านล่างเพื่อเข้าสู่ดิสคอร์ดหรือดูขั้นตอนการสั่งซื้อได้เลย
        </p>

        <!-- กลุ่มปุ่มกด -->
        <div class="button-group">
            <!-- ปุ่มที่ 1: ลิงก์เข้า Discord -->
            <a href="https://discord.gg/YOUR_INVITE_LINK" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> เข้าร่วม Discord
            </a>

            <!-- ปุ่มที่ 2: วิธีซื้อสคริปต์ -->
            <button onclick="toggleVideo()" class="btn btn-guide">
                <i class="fas fa-shopping-cart"></i> วิธีซื้อสคริปต์
            </button>
        </div>

        <!-- กล่องแสดงวิดีโอแบบเต็มจอ (เริ่มต้นจะถูกซ่อนไว้) -->
        <div id="videoContainer" class="video-box">
            <video id="myVideo" src="88e39a28-563c-4409-b9a1-cc29fe51b7c2.mp4" controls preload="metadata"></video>
        </div>
    </div>

    <!-- JavaScript ควบคุมการเปิด-ปิด และการเล่นวิดีโอ -->
    <script>
        function toggleVideo() {
            var videoBox = document.getElementById("videoContainer");
            var videoPlayer = document.getElementById("myVideo");
            
            // สลับคลาสเปิด/ปิดหน้าต่างวิดีโอ
            videoBox.classList.toggle("show");
            
            // ถ้าย่อกล่องเก็บ ให้สั่งหยุดเล่นวิดีโอโดยอัตโนมัติ
            if (!videoBox.classList.contains("show")) {
                videoPlayer.pause();
            }
        }
    </script>

</body>
</html>
